<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — Logo v2</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 72px;
    padding: 80px 40px;
    font-family: 'Clash Display', sans-serif;
  }

  .section-label {
    color: rgba(255,255,255,0.2);
    font-family: 'Clash Display', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: -52px;
    align-self: flex-start;
    padding-left: 8px;
  }

  /* ─── LOGO 1: Horizontal — Primary Dark ─── */
  .logo-horiz {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0;
    position: relative;
  }

  .logo-icon-wrap {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .logo-icon-wrap svg {
    width: 100%;
    height: 100%;
  }

  .logo-text-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-wordmark {
    font-family: 'Clash Display', sans-serif;
    font-size: 34px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 1px;
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 1px;
  }

  .logo-wordmark .dot {
    color: #3B6FFF;
    font-weight: 600;
  }

  .logo-sub {
    font-family: 'Clash Display', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  /* ─── LOGO 2: Horizontal — with horizontal rule ─── */
  .logo-horiz-ruled {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .ruled-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .ruled-divider {
    width: 1px;
    height: 36px;
    background: rgba(59, 111, 255, 0.3);
  }

  .ruled-text {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .ruled-name {
    font-family: 'Clash Display', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: #ffffff;
    letter-spacing: 3px;
    line-height: 1;
    text-transform: uppercase;
  }

  .ruled-tagline {
    font-family: 'Clash Display', sans-serif;
    font-size: 8.5px;
    font-weight: 400;
    color: #3B6FFF;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ─── LOGO 3: Light ─── */
  .logo-light-wrap {
    background: #F4F5F9;
    padding: 32px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-radius: 4px;
  }

  .light-icon { width: 38px; height: 38px; }

  .light-wordmark {
    font-family: 'Clash Display', sans-serif;
    font-size: 32px;
    font-weight: 600;
    color: #050510;
    letter-spacing: 1px;
    line-height: 1;
  }

  .light-wordmark .dot { color: #2952D9; }

  .light-divider {
    width: 1px;
    height: 28px;
    background: rgba(41, 82, 217, 0.25);
  }

  .light-sub {
    font-family: 'Clash Display', sans-serif;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 4px;
    color: #2952D9;
    text-transform: uppercase;
  }

  /* ─── LOGO 4: Icon only ─── */
  .icon-variants {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .icon-dark {
    width: 72px;
    height: 72px;
    background: #08081a;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(59, 111, 255, 0.2),
      0 0 40px rgba(41, 82, 217, 0.15);
  }

  .icon-blue {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #1D4ED8, #3B6FFF);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(59, 111, 255, 0.4);
  }

  .icon-outline {
    width: 72px;
    height: 72px;
    background: transparent;
    border-radius: 18px;
    border: 1.5px solid rgba(59, 111, 255, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── LOGO 5: Stacked compact ─── */
  .logo-stacked {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .stacked-icon { width: 36px; height: 36px; }

  .stacked-name {
    font-family: 'Clash Display', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 6px;
    text-transform: uppercase;
    line-height: 1;
  }

  .stacked-name .dot { color: #3B6FFF; }

  .stacked-rule {
    width: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3B6FFF, transparent);
  }

  .stacked-sub {
    font-family: 'Clash Display', sans-serif;
    font-size: 7px;
    font-weight: 400;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  /* ─── Divider ─── */
  .divider {
    width: 100%;
    max-width: 500px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

</style>
</head>
<body>

  <p class="section-label">01 — Horizontal · Primary</p>

  <div class="logo-horiz">
    <div class="logo-icon-wrap">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,34 16,20 23,27 40,8" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="32,8 40,8 40,16" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="40" cy="36" r="2" fill="#6B8FFF" opacity="0.4"/>
      </svg>
    </div>
    <div class="logo-text-wrap">
      <div class="logo-wordmark">NOVA<span class="dot">.</span></div>
      <div class="logo-sub">Agency · Dubai</div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">02 — Horizontal · With Divider</p>

  <div class="logo-horiz-ruled">
    <svg class="ruled-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="4,32 14,18 22,25 36,8" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="29,8 36,8 36,15" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="ruled-divider"></div>
    <div class="ruled-text">
      <div class="ruled-name">Nova</div>
      <div class="ruled-tagline">AI Agency · Dubai</div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">03 — Light Version</p>

  <div class="logo-light-wrap">
    <svg class="light-icon" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="3,30 13,17 21,24 35,7" stroke="#2952D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="27,7 35,7 35,15" stroke="#2952D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="light-wordmark">NOVA<span class="dot">.</span></div>
    <div class="light-divider"></div>
    <div class="light-sub">Agency</div>
  </div>

  <div class="divider"></div>

  <p class="section-label">04 — Icon Only</p>

  <div class="icon-variants">
    <div class="icon-dark">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polyline points="4,32 14,18 22,25 36,8" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="28,8 36,8 36,16" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="icon-blue">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polyline points="4,32 14,18 22,25 36,8" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="28,8 36,8 36,16" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="icon-outline">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polyline points="4,32 14,18 22,25 36,8" stroke="#6B8FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="28,8 36,8 36,16" stroke="#6B8FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="divider"></div>

  <p class="section-label">05 — Stacked · Compact</p>

  <div class="logo-stacked">
    <svg class="stacked-icon" viewBox="0 0 36 36" fill="none">
      <polyline points="3,28 12,16 19,22 33,6" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="26,6 33,6 33,13" stroke="#3B6FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="stacked-rule"></div>
    <div class="stacked-name">NOVA<span class="dot">.</span></div>
    <div class="stacked-sub">Dubai · AI Agency</div>
  </div>

</body>
</html>
