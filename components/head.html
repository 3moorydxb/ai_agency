<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050510">
  <meta name="color-scheme" content="dark">
  <!--
    CLOUDFLARE WAF RULE NEEDED FOR GEO/AEO:
    Dashboard → Security → WAF → Custom Rules
    Name: Allow AI crawlers
    Expression: (cf.client.bot)
    Action: Skip → All Security Rules
    This allows GPTBot, PerplexityBot etc to crawl the site for GEO/AEO ranking.
  -->
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="https://novaagency.me/{{CANONICAL_PATH}}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="https://novaagency.me/{{CANONICAL_PATH}}">
  <meta property="og:image" content="https://novaagency.me/assets/img/og-default.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:locale" content="en_AE">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="https://novaagency.me/assets/img/og-default.jpg">
  <!-- Geo / locale signals for GEO + AEO -->
  <meta name="geo.region" content="AE-DU">
  <meta name="geo.placename" content="Dubai">
  <meta name="geo.position" content="25.2048;55.2708">
  <meta name="ICBM" content="25.2048, 55.2708">
  <meta name="language" content="English">
  <meta name="coverage" content="UAE, GCC">
  <meta name="target" content="all">
  <meta name="HandheldFriendly" content="True">
  <!-- Hreflang -->
  <link rel="alternate" hreflang="en" href="https://novaagency.me/{{CANONICAL_PATH}}">
  <link rel="alternate" hreflang="ar" href="https://novaagency.me/{{CANONICAL_PATH}}?lang=ar">
  <link rel="alternate" hreflang="x-default" href="https://novaagency.me/{{CANONICAL_PATH}}">
  <link rel="icon" type="image/svg+xml" href="/assets/img/nova-logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/nova-logo-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="dns-prefetch" href="//api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <!-- Pre-paint language hydration: avoids FOUC when the user has chosen Arabic. -->
  <script>(function(){try{var l=localStorage.getItem('nova_lang');if(l==='ar'){document.documentElement.setAttribute('lang','ar');document.documentElement.setAttribute('dir','rtl');}}catch(e){}})();</script>
